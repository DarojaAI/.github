name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_VERSION: "1.6"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/
      
      - name: Terraform Init
        run: terraform -chdir=terraform init
      
      - name: Terraform Validate
        run: terraform -chdir=terraform validate
      
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: false
      
      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=terraform plan -out=tfplan -input=false
      
      - name: Terraform Apply
        id: apply
        run: |
          terraform -chdir=terraform apply -auto-approve tfplan
      
      - name: Terraform Output
        id: output
        run: |
          terraform -chdir=terraform output -json > /tmp/outputs.json
          echo "outputs=$(cat /tmp/outputs.json)" >> $GITHUB_OUTPUT
      
      - name: Post Apply Summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Terraform apply completed successfully!\n\nOutputs: \`\`\`json\n${process.env.OUTPUTS}\n\`\`\``
            });
        env:
          OUTPUTS: ${{ steps.output.outputs.outputs }}
