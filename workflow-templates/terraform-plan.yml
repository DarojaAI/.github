name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6"
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/
      
      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false
      
      - name: Terraform Validate
        run: terraform -chdir=terraform validate
      
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: false
      
      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "plan=$(cat /tmp/plan.txt | base64 -w0)" >> $GITHUB_OUTPUT
      
      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const plan = Buffer.from(process.env.PLAN, 'base64').toString('utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan.substring(0, 30000)}\n\`\`\``
            });
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
